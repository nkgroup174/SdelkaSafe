# Nginx reverse proxy для SdelkaSafe
# Положить в /etc/nginx/sites-available/sdelkasafe.ru и слинковать в sites-enabled.
# SSL добавит certbot командой:  certbot --nginx -d sdelkasafe.ru -d www.sdelkasafe.ru

server {
    listen 80;
    server_name sdelkasafe.ru www.sdelkasafe.ru;

    # запас под загрузку картинок (5 МБ + служебное)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
